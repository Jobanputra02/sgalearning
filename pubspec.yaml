name: sgalearning
description: "SGA Learning - Guitar Ear Training"
publish_to: 'none'
# version: 1.0.0+1   # first test
# version: 1.0.0+2   # bug fix test
version: 1.0.0+3   # fix firebase auth in release


environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.2
  just_audio: ^0.9.40
  # flutter_native_splash: ^2.4.1
  audio_session: ^0.1.21
  # added for Firebase integration--
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  #-- added for Firebase integration
  # added for offline save progress--
  sqflite: ^2.3.3
  path: ^1.9.0
  connectivity_plus: ^6.0.3
  # --added for offline save progress
  fl_chart: ^0.69.0
  intl: ^0.19.0
  flutter_launcher_icons: ^0.14.4


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/sga-black.png"
  min_sdk_android: 21
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/sga-black.png"

